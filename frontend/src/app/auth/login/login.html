<div class="login-container">
  <div class="login-card">

    <div class="login-logo">
      <span class="logo-icon">🏦</span>
      <h1>STB</h1>
      <p>Gestion des Réclamations</p>
    </div>

    <!-- TABS -->
    <div class="login-tabs">
      <button class="tab-btn" [class.active]="mode === 'login'" (click)="switchMode('login')">
        Connexion
      </button>
      <button class="tab-btn" [class.active]="mode === 'register'" (click)="switchMode('register')">
        Inscription
      </button>
    </div>

    <!-- FORMULAIRE CONNEXION -->
    @if (mode === 'login') {
      <div class="login-form">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="votre@email.com"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <input
            type="password"
            [(ngModel)]="mot_de_passe"
            placeholder="••••••••"
            class="form-input"
          />
        </div>

        @if (errorMessage) {
          <div class="error-message">⚠️ {{ errorMessage }}</div>
        }

        <button class="btn-login" (click)="onLogin()" [disabled]="loading">
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </div>
    }

    <!-- FORMULAIRE INSCRIPTION -->
    @if (mode === 'register') {
      <div class="login-form">
        <div class="form-group">
          <label>Nom complet</label>
          <input
            type="text"
            [(ngModel)]="nom"
            placeholder="Votre nom et prénom"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            [(ngModel)]="emailRegister"
            placeholder="votre@email.com"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label>Mot de passe</label>
          <input
            type="password"
            [(ngModel)]="mot_de_passeRegister"
            placeholder="••••••••"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label>Confirmer le mot de passe</label>
          <input
            type="password"
            [(ngModel)]="mot_de_passeConfirm"
            placeholder="••••••••"
            class="form-input"
          />
        </div>

        @if (errorMessage) {
          <div class="error-message">⚠️ {{ errorMessage }}</div>
        }

        @if (successMessage) {
          <div class="success-message">✅ {{ successMessage }}</div>
        }

        <button class="btn-login" (click)="onRegister()" [disabled]="loading">
          {{ loading ? 'Inscription...' : 'S\'inscrire' }}
        </button>
      </div>
    }

  </div>
</div>
